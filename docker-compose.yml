version: '3.8'

services:
  redis:
    image: redis:7-alpine
    command: redis-server
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      start_period: 5s
      retries: 5

  api:
    build: ./api
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/docs')"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5

  worker:
    build: ./worker
    networks:
      - internal
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    networks:
      - internal
    environment:
      - API_URL=http://api:8000
    depends_on:
      api:
        condition: service_healthy

networks:
  internal:
    driver: bridge