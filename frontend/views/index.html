<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Processor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 0 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        #jobs { margin-top: 20px; }
        .job { padding: 8px; border: 1px solid #ccc; margin: 4px 0; border-radius: 4px; }
        #error { color: red; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Job Processor</h1>
    <button onclick="submitJob()">Submit New Job</button>
    <div id="error"></div>
    <div id="jobs"></div>

    <script>
        let csrfToken = "";

        async function init() {
            try {
                const res = await fetch("/csrf-token");
                const data = await res.json();
                csrfToken = data.csrfToken;
            } catch (err) {
                document.getElementById("error").textContent = "Failed to load page security token.";
            }
        }

        async function submitJob() {
            document.getElementById("error").textContent = "";
            try {
                const res = await fetch("/submit", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "CSRF-Token": csrfToken
                    }
                });
                if (!res.ok) throw new Error("Submit failed");
                const data = await res.json();
                addJobToPage(data.job_id);
            } catch (err) {
                document.getElementById("error").textContent = "Error submitting job: " + err.message;
            }
        }

        function addJobToPage(jobId) {
            const div = document.createElement("div");
            div.className = "job";
            div.id = "job-" + jobId;
            div.textContent = `Job ${jobId}: queued`;
            document.getElementById("jobs").prepend(div);
            pollJob(jobId);
        }

        async function pollJob(jobId) {
            try {
                for (let i = 0; i < 30; i++) {
                    await new Promise(r => setTimeout(r, 1000));
                    const res = await fetch(`/jobs/${jobId}`);
                    if (!res.ok) throw new Error("Poll failed");
                    const data = await res.json();
                    const el = document.getElementById("job-" + jobId);
                    if (el) el.textContent = `Job ${jobId}: ${data.status}`;
                    if (data.status === "completed") return;
                }
            } catch (err) {
                const el = document.getElementById("job-" + jobId);
                if (el) el.textContent = `Job ${jobId}: error polling status`;
            }
        }

        init();
    </script>
</body>
</html>
