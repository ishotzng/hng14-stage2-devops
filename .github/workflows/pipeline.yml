name: CI/CD Pipeline

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ══════════════════════════════════════════
  # STAGE 1 — LINT
  # ══════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Lint api/main.py
        run: flake8 api/main.py --max-line-length=120

      - name: Lint worker/worker.py
        run: flake8 worker/worker.py --max-line-length=120

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Lint frontend/app.js
        run: cd frontend && npx eslint app.js

      - name: Install hadolint
        run: |
          curl -sL https://github.com/hadolint/hadolint/releases/download/v2.12.0/hadolint-Linux-x86_64 \
            -o /usr/local/bin/hadolint
          chmod +x /usr/local/bin/hadolint

      - name: Lint api/Dockerfile
        run: hadolint api/Dockerfile

      - name: Lint worker/Dockerfile
        run: hadolint worker/Dockerfile

      - name: Lint frontend/Dockerfile
        run: hadolint frontend/Dockerfile

  # ══════════════════════════════════════════
  # STAGE 2 — TEST
  # ══════════════════════════════════════════
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r api/requirements.txt pytest pytest-cov httpx

      - name: Run tests with coverage
        run: |
          cd api
          pytest tests/ -v --cov=main --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  # ══════════════════════════════════════════
  # STAGE 3 — BUILD
  # ══════════════════════════════════════════
  build:
    runs-on: ubuntu-latest
    needs: test
    services:
      registry:
        image: registry:2
        ports:
          - 5000:5000
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Build and push API image
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            localhost:5000/api:${{ github.sha }}
            localhost:5000/api:latest

      - name: Build and push worker image
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            localhost:5000/worker:${{ github.sha }}
            localhost:5000/worker:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            localhost:5000/frontend:${{ github.sha }}
            localhost:5000/frontend:latest

  # ══════════════════════════════════════════
  # STAGE 4 — SECURITY SCAN
  # ══════════════════════════════════════════
  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Build images locally for scanning
        run: |
          docker build -t api:scan ./api
          docker build -t worker:scan ./worker
          docker build -t frontend:scan ./frontend

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin v0.50.0

      - name: Scan API image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-api.sarif \
            api:scan

      - name: Scan worker image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-worker.sarif \
            worker:scan

      - name: Scan frontend image
        run: |
          trivy image \
            --exit-code 1 \
            --severity CRITICAL \
            --format sarif \
            --output trivy-frontend.sarif \
            frontend:scan

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-sarif-results
          path: "*.sarif"

  # ══════════════════════════════════════════
  # STAGE 5 — INTEGRATION TEST
  # ══════════════════════════════════════════
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    env:
      REDIS_PASSWORD: integrationtestpassword123
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Write api/.env for integration test
        run: |
          echo "REDIS_HOST=redis" > api/.env
          echo "REDIS_PORT=6379" >> api/.env
          echo "REDIS_PASSWORD=${{ env.REDIS_PASSWORD }}" >> api/.env
          echo "APP_ENV=test" >> api/.env

      - name: Start the full stack
        run: docker compose up --build -d

      - name: Wait for all services to be ready (up to 90 seconds)
        run: |
          echo "Waiting for services to become healthy..."
          for i in $(seq 1 18); do
            sleep 5
            UNHEALTHY=$(docker compose ps | grep -c "unhealthy" || true)
            STARTING=$(docker compose ps | grep -c "starting" || true)
            echo "Check $i/18, unhealthy: $UNHEALTHY, starting: $STARTING"
            if [ "$UNHEALTHY" -eq 0 ] && [ "$STARTING" -eq 0 ]; then
              echo "All services ready!"
              break
            fi
          done
          docker compose ps

      - name: Submit a job through the frontend
        run: |
          echo "Submitting job..."
          RESPONSE=$(curl -sf -X POST \
            -H "Content-Type: application/json" \
            http://localhost:3000/submit || echo "FAILED")
          echo "Response: $RESPONSE"

          if [ "$RESPONSE" = "FAILED" ]; then
            echo "Submit request failed!"
            exit 1
          fi

          JOB_ID=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Got job ID: $JOB_ID"
          echo "JOB_ID=$JOB_ID" >> $GITHUB_ENV

      - name: Poll until job completes (up to 30 seconds)
        run: |
          echo "Polling job $JOB_ID..."
          for i in $(seq 1 30); do
            sleep 1
            STATUS=$(curl -sf http://localhost:3000/jobs/$JOB_ID \
              | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))" \
              || echo "error")
            echo "Attempt $i: status = $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully!"
              exit 0
            fi
          done
          echo "Job did not complete within 30 seconds!"
          exit 1

      - name: Tear down stack (runs even if previous steps failed)
        if: always()
        run: docker compose down -v

  # ══════════════════════════════════════════
  # STAGE 6 — DEPLOY
  # Only runs on pushes to the main branch
  # ══════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Write api/.env using GitHub secret
        run: |
          echo "REDIS_HOST=redis" > api/.env
          echo "REDIS_PORT=6379" >> api/.env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> api/.env
          echo "APP_ENV=production" >> api/.env

      - name: Start base stack (redis + existing services)
        run: docker compose up --build -d

      - name: Wait for base stack to be healthy
        run: |
          for i in $(seq 1 18); do
            sleep 5
            UNHEALTHY=$(docker compose ps | grep -c "unhealthy" || true)
            [ "$UNHEALTHY" -eq 0 ] && echo "Stack healthy" && break
            echo "Waiting... ($i/18)"
          done

      - name: Build new API image for rolling update
        run: docker build -t api:new ./api

      - name: Perform rolling update on API service
        run: |
          NETWORK=$(docker network ls --filter name=internal --format "{{.Name}}" | head -1)
          echo "Using network: $NETWORK"

          docker run -d \
            --name api_new \
            --network "$NETWORK" \
            --env-file api/.env \
            --health-cmd "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/docs')\"" \
            --health-interval 10s \
            --health-timeout 5s \
            --health-retries 6 \
            api:new

          echo "Waiting up to 60 seconds for new container to pass healthcheck..."
          for i in $(seq 1 12); do
            sleep 5
            HEALTH=$(docker inspect --format='{{.State.Health.Status}}' api_new 2>/dev/null || echo "none")
            echo "Health check $i/12: $HEALTH"

            if [ "$HEALTH" = "healthy" ]; then
              echo "New container is healthy! Switching over..."
              docker stop api_1 2>/dev/null || docker stop hng14-stage2-devops-api-1 2>/dev/null || true
              docker rm api_1 2>/dev/null || docker rm hng14-stage2-devops-api-1 2>/dev/null || true
              docker rename api_new api_1 2>/dev/null || true
              echo "Rolling update complete!"
              exit 0
            fi
          done

          echo "Health check failed within 60 seconds. Aborting update, old container stays running."
          docker stop api_new || true
          docker rm api_new || true
          exit 1